                '200':
                    description: Achievements retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    successes:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Success'

    /user/success/{userId}:
        get:
            tags:
                - Achievements
            summary: Get user achievements
            description: Get all achievements obtained by a specific user
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: User achievements retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    successes:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/UserSuccess'

    /success/{successId}:
        get:
            tags:
                - Achievements
