    /success/save/{successId}:
        post:
            tags:
                - Achievements
            summary: Save an achievement
            description: Award an achievement to the authenticated user
            security:
                - bearerAuth: []
            parameters:
                - name: successId
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                '201':
                    description: Achievement saved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: User or achievement not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
